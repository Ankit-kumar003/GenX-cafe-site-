{% extends 'base.html' %}
{% block title %}Admin Login – Gen X Cafe{% endblock %}
{% block content %}
<section class="auth-section">
  <div class="container">
    <div class="auth-card">
      <div class="auth-logo">☕ Gen<span class="accent">X</span> Cafe</div>
      <h4 class="auth-title">Admin Login</h4>
      <form method="POST" action="{{ url_for('auth.login') }}">
        <div class="mb-3">
          <label class="form-label">Email Address</label>
          <input type="email" name="email" class="form-control" placeholder="admin@genxcafe.com" required autofocus>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <div class="input-group">
            <input type="password" name="password" id="pwdInput" class="form-control" placeholder="••••••••" required>
            <button class="btn btn-outline-secondary" type="button" onclick="togglePwd()">
              <i class="bi bi-eye" id="eyeIcon"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 btn-lg">Login</button>
      </form>
      <p class="text-center mt-3 text-muted small">Default: admin@genxcafe.com / Admin@123</p>
    </div>
  </div>
</section>
{% endblock %}
{% block extra_js %}
<script>
function togglePwd() {
  const inp = document.getElementById('pwdInput');
  const ic = document.getElementById('eyeIcon');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  ic.className = inp.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
}
</script>
{% endblock %}
